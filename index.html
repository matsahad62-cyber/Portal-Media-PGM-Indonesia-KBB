<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Sertifikat - PGM Academy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial; 
      background: #0d4f3c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 420px;
    }
    .card {
      background: white;
      padding: 32px 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .icon {
      width: 48px;
      height: 48px;
      background: #e8f5f0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 24px;
    }
    h2 {
      text-align: center;
      color: #0d4f3c;
      font-size: 22px;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      color: #333;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      margin-bottom: 16px;
      transition: border 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #0d4f3c;
    }
    button {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: #0d4f3c;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #0a3d2f;
    }
    .divider {
      text-align: center;
      margin: 20px 0;
      color: #999;
      font-size: 13px;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #e0e0e0;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .info-btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      color: #0d4f3c;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .notice {
      margin-top: 20px;
      padding: 14px;
      background: #e8f5f0;
      border-radius: 10px;
      font-size: 13px;
    }
    .notice b {
      color: #0d4f3c;
      display: block;
      margin-bottom: 4px;
    }
    .notice p {
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon">📄</div>
      <h2>Cek Sertifikat Anda</h2>
      <p class="subtitle">Masukkan NIK untuk menemukan sertifikat Anda</p>
      
      <!-- INI FORM YANG NYAMBUNG KE APPS SCRIPT V2 -->
      <form action="https://script.google.com/macros/s/AKfycbwkVelVtqMX64yPT7gmTub8tYKkFJxzBs3-3HG57TXRKaZ5NCVPVPPwK5W_z-6oHbh-bA/exec" method="GET">
        <label>Nomor Induk Kependudukan (NIK)</label>
        <input type="text" name="nik" placeholder="Contoh: 3171234567890001" required>
        <button type="submit">🔍 Cek & Download Sertifikat</button>
      </form>

      <div class="divider">atau</div>
      
      <a href="https://forms.gle/BphpqbjkBKG6ih3E8" target="_blank" class="info-btn">
        ℹ️ Cara Menemukan NIK
      </a>

      <div class="notice">
        <b>Data Anda aman bersama kami</b>
        <p>Kami tidak menyimpan data pribadi Anda. Sertifikat hanya dapat diakses oleh pemilik sah.</p>
      </div>
    </div>
  </div>
</body>
</html>
