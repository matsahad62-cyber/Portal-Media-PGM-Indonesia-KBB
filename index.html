<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Sertifikat - PGM Indonesia KBB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        #result iframe { width: 100%; border: none; }
    </style>
</head>
<body class="bg-[#0B2D2A]">

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-lg w-full max-w-lg mx-4 sm:mx-0 overflow-hidden">
            <!-- Header -->
            <div class="bg-[#0B2D2A] p-8 text-center">
                <img src="https://pgmindonesia.id/wp-content/uploads/2023/08/logo-pgm-png.png" alt="Logo PGM" class="h-14 mx-auto mb-4">
                <h1 class="text-white text-2xl font-bold">Cek Sertifikat Anda</h1>
                <p class="text-gray-300 text-sm mt-1">Masukkan NIK untuk menemukan sertifikat Anda</p>
            </div>

            <!-- Form -->
            <div class="p-8">
                <label for="nik" class="block text-sm font-semibold text-gray-800 mb-2">Nomor Induk Kependudukan (NIK)</label>
                <input type="text" id="nik" maxlength="16" placeholder="Contoh: 3171234567890001" class="w-full px-4 py-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0B2D2A] focus:border-transparent outline-none text-center text-lg tracking-widest">
                
                <button onclick="cekNIK()" class="w-full bg-[#0B2D2A] text-white py-3.5 rounded-xl font-semibold hover:bg-opacity-90 transition mt-4 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>Cek & Download Sertifikat</span>
                </button>

                <div class="flex items-center my-6">
                    <hr class="flex-1 border-gray-200"><span class="px-3 text-xs text-gray-400">atau</span><hr class="flex-1 border-gray-200">
                </div>

                <button class="w-full border border-gray-300 text-gray-700 py-3 rounded-xl font-medium hover:bg-gray-50 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-circle-question"></i>
                    <span>Cara Menemukan NIK</span>
                </button>

                <div class="bg-[#E8F9F7] border border-teal-100 rounded-xl p-4 mt-6 text-sm">
                    <p class="font-semibold text-[#0B2D2A]">Data Anda aman bersama kami</p>
                    <p class="text-gray-600 mt-1">Kami tidak menyimpan data pribadi Anda. Sertifikat hanya dapat diakses oleh pemilik sah.</p>
                </div>

                <!-- Hasil muncul di sini -->
                <div id="result" class="mt-6"></div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxx.../exec";

        async function cekNIK() {
            const nikInput = document.getElementById('nik');
            const resultDiv = document.getElementById('result');
            const nik = nikInput.value.trim();

            if (nik.length !== 16 || !/^\d+$/.test(nik)) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-800 rounded-xl p-4 text-sm">
                        <i class="fa-solid fa-circle-exclamation mr-2"></i>
                        NIK harus 16 digit angka.
                    </div>`;
                return;
            }

            resultDiv.innerHTML = `
                <div class="text-center text-gray-500 py-8">
                    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                    <p class="text-sm">Sedang mengecek data...</p>
                </div>`;

            try {
                const response = await fetch(`${SCRIPT_URL}?nik=${nik}`);
                const html = await response.text();
                resultDiv.innerHTML = `<iframe srcdoc="${html.replace(/"/g, '&quot;')}" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px';"></iframe>`;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-800 rounded-xl p-4 text-sm">
                        <i class="fa-solid fa-wifi mr-2"></i>
                        Gagal terhubung ke server. Coba refresh halaman.
                    </div>`;
            }
        }

        document.getElementById('nik').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') cekNIK();
        });
    </script>
</body>
</html>
